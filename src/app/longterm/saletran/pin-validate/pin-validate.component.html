<div class="modal-header pin-modal-header">
    <div>
        <h4 class="modal-title">Validate PIN</h4>
        <div class="pin-modal-subtitle">Enter your 4-digit security PIN to continue.</div>
    </div>
</div>

<div class="modal-content pin-modal-content">
    <div class="pin-panel">
        <label class="pin-label" for="lpin">PIN Code</label>
        <input data-testid="qa-input-action"
            class="form-control pin-input"
            type="password"
            [(ngModel)]="vpin"
            maxlength="4"
            placeholder="Enter PIN"
            (keyup)="pinKeyUp($event)"
            autofocus="autofocus"
            name="lpin"
            id="lpin" />
        <div class="pin-help">Validation is triggered automatically after 4 digits.</div>
    </div>
</div>

<div class="modal-footer pin-modal-footer">
    <div class="pin-actions">
        <button class="btn btn-primary" id="btnMainMenu" type="button" (click)="goToMainMenu()">Main Menu</button>
        <button class="btn btn-primary" id="btnLogout" type="button" (click)="logout()">Logout</button>
    </div>
</div>
