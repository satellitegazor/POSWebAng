<div class="modal-header border-0 pb-0">
	<div>
		<h4 class="modal-title mb-1">{{ title }}</h4>
		<p class="modal-subtitle mb-0">Update the ticket readiness, pickup status, and rack location.</p>
	</div>

	<button type="button" class="btn-close" aria-label="Close" (click)="cancel()"></button>
</div>

<div class="modal-body pt-3">
	<div class="ticket-status-shell">
		<aside class="ticket-status-aside">
			<div class="ticket-status-icon">TS</div>
			<div>
				<div class="ticket-status-aside-title">Ticket Workflow</div>
				<p class="ticket-status-aside-copy mb-0">
					Keep the customer-facing status, ready-by date, and rack assignment in sync before saving.
				</p>
			</div>
		</aside>

		<section class="ticket-status-panel card border-0 shadow-sm">
			<div class="card-body p-3 p-md-4">
				<div class="row g-3" *ngIf="showBalanceFields">
					<div class="col-md-4">
						<label class="form-label field-label mb-1">Balance Due</label>
						<div class="field-value">{{ balanceDueDisplay }}</div>
					</div>

					<div class="col-md-4">
						<label for="paymentduebydate" class="form-label field-label">Next Payment Due</label>
						<input
							id="paymentduebydate"
							name="paymentduebydate"
							type="date"
							class="form-control"
							[(ngModel)]="nextPaymentDueValue">
					</div>

					<div class="col-12">
						<hr class="section-divider my-1">
					</div>
				</div>

				<div class="row g-3 align-items-start">
					<div class="col-md-4">
						<label for="rdybydate" class="form-label field-label">Ready by Date</label>
						<input
							id="rdybydate"
							name="rdybydate"
							type="date"
							class="form-control"
							[(ngModel)]="readyByDateValue">
					</div>

					<div class="col-md-3">
						<label for="readyByTime" class="form-label field-label">Ready by Time</label>
						<select
							id="readyByTime"
							name="readyByTime"
							class="form-select"
							[(ngModel)]="readyByTimeValue">
							<option *ngFor="let time of readyByTimeOptions" [ngValue]="time">{{ time }}</option>
						</select>
					</div>

					<div class="col-md-5">
						<label for="pickupStatus" class="form-label field-label">Pickup Status</label>
						<select
							id="pickupStatus"
							name="pickupStatus"
							class="form-select"
							[ngModel]="editableTicketStatus.tktStatusId"
							(ngModelChange)="onPickupStatusChange($event)">
							<option *ngFor="let status of ticketStatuses; trackBy: trackByTicketStatusId" [ngValue]="status.tktStatusId">
								{{ status.description }}
							</option>
						</select>
						<div class="form-text">Current selection: {{ pickupStatusDescription }}</div>
					</div>

					<div class="col-12">
						<label for="rckLoc" class="form-label field-label">Rack Location</label>
						<input
							id="rckLoc"
							name="rckLoc"
							type="text"
							class="form-control text-uppercase"
							maxlength="10"
							list="rackLocationOptions"
							placeholder="Enter rack description"
							[(ngModel)]="editableTicketStatus.rckLocDesc"
							(ngModelChange)="onRackLocationInput()">
						<datalist id="rackLocationOptions" *ngIf="hasRackLocationSuggestions">
							<option *ngFor="let rackLocation of rackLocations; trackBy: trackByRackLocationId" [value]="rackLocation.description"></option>
						</datalist>
					</div>
				</div>
			</div>
		</section>
	</div>
</div>

<div class="modal-footer border-0 pt-0">
	<button type="button" class="btn btn-primary px-4" [disabled]="!hasChanges" (click)="save()">Save</button>
	<button type="button" class="btn btn-outline-secondary px-4" (click)="cancel()">Cancel</button>
</div>
