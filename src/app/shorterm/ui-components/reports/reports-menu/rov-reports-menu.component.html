<div class="reports-menu-wrap">
	<table class="reports-menu-table" role="presentation">
		<tbody>
			<tr>
				<td class="menu-col">
					<ul class="reports-menu-list">
						<li class="reports-menu-item">
							<a data-testid="qa-link-action" href="#" class="reports-menu-link" (click)="$event.preventDefault(); goToSettlementReport()">
								<table class="reports-item-grid" role="presentation">
									<tr>
										<td class="icon-cell">
											<svg class="menu-icon" viewBox="0 0 24 24" aria-label="Settlement Report" role="img">
												<path d="M5 4h14v2H5zm0 4h14v12H5zm3 3h8v2H8zm0 4h5v2H8z"></path>
											</svg>
										</td>
										<td class="label-cell">Settlement Report</td>
										<td class="arrow-cell"><span class="arrow-glyph">&#8250;</span></td>
									</tr>
								</table>
							</a>
						</li>

						<li class="reports-menu-item">
							<a data-testid="qa-link-action-2" href="#" class="reports-menu-link" (click)="$event.preventDefault(); goToSalesTransactionReport()">
								<table class="reports-item-grid" role="presentation">
									<tr>
										<td class="icon-cell">
											<svg class="menu-icon" viewBox="0 0 24 24" aria-label="Sales Transaction Report" role="img">
												<path d="M4 19h16v2H4zM6 10h2v7H6zm5-4h2v11h-2zm5 2h2v9h-2z"></path>
											</svg>
										</td>
										<td class="label-cell">Sales Transaction Report</td>
										<td class="arrow-cell"><span class="arrow-glyph">&#8250;</span></td>
									</tr>
								</table>
							</a>
						</li>


					</ul>

					<ul class="reports-menu-list">

						<li class="reports-menu-item">
							<a data-testid="qa-link-action-6" href="#" class="reports-menu-link" (click)="$event.preventDefault(); goToCashDrawerReport()">
								<table class="reports-item-grid" role="presentation">
									<tr>
										<td class="icon-cell">
											<svg class="menu-icon" viewBox="0 0 24 24" aria-label="Cash Drawer Report" role="img">
												<path d="M4 6h16v5H4zM4 12h16v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6zm9 3h4v2h-4z"></path>
											</svg>
										</td>
										<td class="label-cell">Cash Drawer Report</td>
										<td class="arrow-cell"><span class="arrow-glyph">&#8250;</span></td>
									</tr>
								</table>
							</a>
						</li>

						<li *ngIf="rgnCode !== 'CON'" class="reports-menu-item">
							<a data-testid="qa-link-action-7" href="#" class="reports-menu-link" (click)="$event.preventDefault(); goToDailyExchangeReport()">
								<table class="reports-item-grid" role="presentation">
									<tr>
										<td class="icon-cell">
											<svg class="menu-icon" viewBox="0 0 24 24" aria-label="Daily Exchange Report" role="img">
												<path d="M5 5h14v14H5zm3 3h8v2H8zm0 4h8v2H8zm0 4h5v2H8z"></path>
											</svg>
										</td>
										<td class="label-cell">Daily Exchange Report</td>
										<td class="arrow-cell"><span class="arrow-glyph">&#8250;</span></td>
									</tr>
								</table>
							</a>
						</li>
					</ul>
				</td>
			</tr>
		</tbody>
	</table>
</div>
