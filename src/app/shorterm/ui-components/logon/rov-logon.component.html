<br />
<div class="container-fluid">

    <div class="row justify-content-center">
        <div class="card form-group" style="width: 36rem;">
            <h5 class="card-header">Login</h5>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label" for="exchangenumber">Exchange</label>
                    <input type="text" class="form-control" id="exchangenumber" [(ngModel)]="exchangenum" maxlength="4"
                        (change)="OnChangeExchangeNum($event)" />
                </div>
                <div class="mb-3">
                    <label class="form-label" for="vendornumber">Vendor Number</label>
                    <input type="text" class="form-control" id="vendornumber" [(ngModel)]="vendornum" maxlength="8"
                        (change)="OnChangeVendorNum($event)" />
                </div>
                <div class="mb-3">
                    <label for="ddlEvent">Event</label>
                    <select #ddlEvent id="ddlEvent" class="form-select dropdown"
                        (change)="onEventChange($event, ddlEvent.value)">
                        <option *ngFor="let ev of eventList" [selected]="ev.eventId == selectedEventId"
                            [value]="ev.eventId">
                            {{ev.eventName}}
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label" for="pin">PIN</label>
                    <input type="password" id="pin" [(ngModel)]="lpin" class="form-control" maxlength="4"
                        minlength="4" />
                </div>
                <button name="btnSubmit" id="btnSubmit" class="btn btn-primary" (click)="DoLogon($event)">Logon</button>
            </div>
        </div>

        <div class="test-devices-section">
            <div class="test-devices-container">
                <h6 class="test-devices-title">Test Devices</h6>
                <div class="test-buttons-grid">
                    <button data-testid="qa-button-testpinpad" class="btn btn-test test-pinpad" (click)="testPinpad()"
                        title="Test Pinpad">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                            viewBox="0 0 16 16">
                            <path
                                d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v1h14V4a1 1 0 0 0-1-1H2z" />
                            <path d="M1 8v3a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8H1z" />
                        </svg>
                        <span>Test Pinpad</span>
                    </button>
                </div>
            </div>
            <div id="noEventsalert" class="alert alert-warning" role="alert" style="display:none">
                No Events matched the given Exchange Number
            </div>
            <div id="logonSuccessMsg" class="bar bar-footer bar-balanced alert alert-success alert-dismissible fade"
                [style.display]="successMsgDisplay">
                <strong>Success!</strong> You have successfully logged in.
                <button aria-label="Close" type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div id="logonFailMsg" class="alert alert-danger alert-dismissible fade" [style.display]="errorMsgDisplay">
                <strong>Error!</strong> Unable to login. Please verify the credentials entered.
                <button aria-label="Close" type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>

    </div>
