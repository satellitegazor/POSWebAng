<div class="modal-header">
	<h4>Shipping/Handling</h4>
</div>
<div class="modal-content">
	<div class="panel">
		<div class="panel-body">
			<table class="table table-striped">
				<tr>
					<td style="width:40%;">Enter Shipping/Handling (optional):&nbsp;</td>
					<td><span class="dfltCurSymbl">{{dfltCurrSymbl}}</span></td>
					<td style="text-align:left;">
						<input data-testid="qa-input-action"
							id="txtShipHandling"
							type="text"
							placeholder="Shipping/Handling"
							maxlength="10"
							autofocus
							class="form-control shipHandling"
							[(ngModel)]="shipHandlingAmountUIVal"
							(ngModelChange)="onShipHandlingAmountChange($event)"
							[appPosCurrency]="dfltCurrSymbl"
							appPosCurrency />
					</td>
					<td style="text-align:left;">
						<input data-testid="qa-input-action-2"
							id="txtShipHandlingTaxPct"
							type="text"
							placeholder="Tax Percent"
							maxlength="6"
							class="form-control shipHandling"
							appPosCurrency3
							[(ngModel)]="shipHandlingTaxPctUIVal"
							(ngModelChange)="onShipHandlingTaxPctChange($event)" />
					</td>
					<td>%</td>
				</tr>
			</table>
			<div *ngIf="shipHandlingAmountErrorMsg" class="text-danger">
				{{shipHandlingAmountErrorMsg}}
			</div>
			<div *ngIf="shipHandlingTaxPctErrorMsg" class="text-danger">
				{{shipHandlingTaxPctErrorMsg}}
			</div>
		</div>
	</div>
</div>
<div class="modal-footer">
	<div class="row">
		<button data-testid="qa-button-continue" class="btn btn-info" (click)="Continue()">Continue</button>&nbsp;
		<button data-testid="qa-button-cancel" class="btn btn-info" (click)="Cancel()">Cancel</button>&nbsp;
	</div>
</div>
