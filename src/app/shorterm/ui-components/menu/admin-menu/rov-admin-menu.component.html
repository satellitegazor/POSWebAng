<div class="d-flex flex-column min-vh-100">
    <!-- Main Content -->
    <div class="flex-grow-1">
        <div class="container-fluid py-4">
            <div class="card shadow-lg border-0">

                <!-- Menu Items -->
                <div class="list-group list-group-flush">
                    <!-- Associate Maintenance -->
                    <a (click)="gotoAssocMaint()"
                        class="admin-menu-link d-flex align-items-center py-4 px-4" style="cursor:pointer;">
                        <div class="flex-grow-1">
                            <h5 class="mb-1">Associate Maintenance</h5>
                            <small class="text-muted">Manage associates, permissions & roles</small>
                        </div>
                        <i class="bi bi-chevron-right fs-4 text-muted"></i>
                    </a>

                    <!-- Item Buttons and Tax Setup -->
                    <a (click)="gotoItemBtnMenu()"
                        class="admin-menu-link d-flex align-items-center py-4 px-4" style="cursor:pointer;">
                        <div class="flex-grow-1">
                            <h5 class="mb-1">Item Buttons and Tax Setup</h5>
                            <small class="text-muted">Configure buttons, pricing & taxes</small>
                        </div>
                        <i class="bi bi-chevron-right fs-4 text-muted"></i>
                    </a>

                    <!-- Special Instructions Setup -->
                    <a (click)="gotoSplInstr()"
                        class="admin-menu-link d-flex align-items-center py-4 px-4" style="cursor:pointer;">
                        <div class="flex-grow-1">
                            <h5 class="mb-1">Special Instructions Setup</h5>
                            <small class="text-muted">Manage custom notes & instructions</small>
                        </div>
                        <i class="bi bi-chevron-right fs-4 text-muted"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed Bottom Footer Navigation -->
    <footer class="fixed-bottom bg-white border-top shadow-lg cncsn-footer">
        <div class="container-fluid px-0">
            <div class="row g-0 text-center">
                <!-- Sales Transaction -->
                <div class="col-4">
                    <a routerLink="/sales-transaction"
                        class="d-flex flex-column align-items-center justify-content-center h-100 text-decoration-none text-primary">
                        <i class="bi bi-cart fs-3 mb-1"></i>
                        <small class="fw-medium">Sales Transaction</small>
                    </a>
                </div>

                <!-- Refund Transaction -->
                <div class="col-4">
                    <a routerLink="/refund-transaction"
                        class="d-flex flex-column align-items-center justify-content-center h-100 text-decoration-none text-danger">
                        <i class="bi bi-arrow-counterclockwise fs-3 mb-1"></i>
                        <small class="fw-medium">Refund Transaction</small>
                    </a>
                </div>

                <!-- Ticket Lookup -->
                <div class="col-4">
                    <a routerLink="/ticket-lookup"
                        class="d-flex flex-column align-items-center justify-content-center h-100 text-decoration-none text-info">
                        <i class="bi bi-search fs-3 mb-1"></i>
                        <small class="fw-medium">Ticket Lookup</small>
                    </a>
                </div>
            </div>
        </div>
    </footer>
</div>
