<div class="modal-header py-2 px-3 contractselect-header">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" class="bi bi-bookshelf me-3"
                            viewBox="0 0 16 16" aria-label="Bookshelf icon">
                            <path
                                d="M2 2v12h1V2H2zm2 0v12h1V2H4zm2 0v12h1V2H6zm2 0v12h1V2H8zm2 0v12h1V2h-1zm2 0v12h1V2h-1zM1 1.5A.5.5 0 0 1 1.5 1h13a.5.5 0 0 1 .5.5v13a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-13zM2 2v12h12V2H2z" />
                        </svg>
    <h5 id="dlgEventFilterLabel">Select Criteria for Contract Selection</h5>
    <button type="button" class="btn-close close-contract-selection" aria-label="Close" (click)="activeModal.dismiss('close')"></button>
</div>
<div class="modal-body px-4">
                
                <div class="mb-3 text-muted" style="font-size: 0.95rem;">
                    Enter any portion of the Vendor Number and/or 4-digit Exchange Number, or select the 'Select All'
                    option. Select a timeframe to
                    include any combination of past, current or future contracts.
                </div>
                <div class="row mb-3 vendor-filter-group">
                    <div class="col-8">
                        <div class="mb-2">
                            <label for="txtFilterVendorNumber" class="form-label mb-1">Vendor Number</label>
                            <input id="txtFilterVendorNumber" maxlength="10" name="FilterVendorNumber"
                                placeholder="Vendor" type="text" class="form-control" disabled>
                        </div>
                        <div class="mb-2">
                            <label for="txtFilterExchangeNumber" class="form-label mb-1">Exchange Number</label>
                            <input id="txtFilterExchangeNumber" maxlength="4" name="FilterExchangeNumber"
                                placeholder="Exch" type="text" class="form-control" disabled>
                        </div>
                        <div>
                            <label for="txtFilterFacilityNumber" class="form-label mb-1">Facility Number</label>
                            <input id="txtFilterFacilityNumber" maxlength="10" name="FilterFacilityNumber"
                                placeholder="Facility" type="text" class="form-control" disabled>
                        </div>
                    </div>
                    <div class="col-4 d-flex flex-column align-items-center justify-content-center">
                        <div class="form-check mt-4">
                            <input class="form-check-input" type="checkbox" id="filterSelectAll" checked (change)="onFilterSelectAllChange($event)">
                            <label class="form-check-label" for="filterSelectAll">
                                Select All
                            </label>
                        </div>
                    </div>
                </div>
                <div class="row mb-3 align-items-center">
                    <div class="col-4 text-end">
                        <label for="regiontype" class="form-label">Region</label>
                    </div>
                    <div class="col-6">
                        <select id="regiontype" class="form-select">
                            <option value="CON" selected>CONUS (Including Hawaii and Alaska)</option>
                        </select>
                    </div>
                </div>
                <div class="row mb-3 align-items-center">
                    <div class="col-4 text-end">
                        <label for="contracttype" class="form-label">Contract Type</label>
                    </div>
                    <div class="col-6">
                        <select id="contracttype" class="form-select">
                            <option value="ALL" selected>All</option>
                            <option value="LTC">LTC Contract</option>
                            <option value="ROV">ST Com/LT Roving</option>
                        </select>
                    </div>
                </div>
                <div class="row mb-3 align-items-center">
                    <div class="col-4 text-end">
                        <label class="form-label mb-0">Timeframe</label>
                    </div>
                    <div class="col-8">
                        <div class="timeframe-toggle-group" role="group" aria-label="Timeframe filter toggles">
                            <input type="checkbox" class="btn-check" id="dvFilterPast" value="P" autocomplete="off">
                            <label class="btn timeframe-toggle" for="dvFilterPast">Past</label>

                            <input type="checkbox" class="btn-check" id="dvFilterCurrent" value="C" checked autocomplete="off">
                            <label class="btn timeframe-toggle" for="dvFilterCurrent">Current</label>

                            <input type="checkbox" class="btn-check" id="dvFilterFuture" value="F" autocomplete="off">
                            <label class="btn timeframe-toggle" for="dvFilterFuture">Future</label>
                        </div>
                    </div>
                </div>
</div>
<div class="modal-footer justify-content-center">
    <button type="button" class="btn btn-primary" id="btnSelectFilter" (click)="onSelectFilter()">
        <i class="bi bi-arrow-repeat me-1"></i>Select
    </button>
</div>
