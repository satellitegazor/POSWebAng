<div class="modal-header py-2 px-3">
	<h5 class="modal-title">Select Region Currency</h5>
	<button
		type="button"
		class="btn-close"
		aria-label="Close"
		(click)="cancel()"
	></button>
</div>

<div class="modal-body px-4">
	<div *ngIf="isLoading" class="text-muted">Loading region and currencies...</div>

	<div *ngIf="!isLoading && errorMessage" class="alert alert-danger mb-0" role="alert">
		{{ errorMessage }}
	</div>

	<div *ngIf="!isLoading && !errorMessage" class="row g-3">
		<div class="col-12 d-flex align-items-center">
			<label class="form-label mb-0 me-2 fw-semibold">Region Code:</label>
			<span>{{ regionCode }}</span>
		</div>

		<div class="col-12">
			<label for="countrySelect" class="form-label">Country</label>
			<select
				id="countrySelect"
				class="form-select"
				[(ngModel)]="selectedCountryCode"
				(ngModelChange)="onCountryChange()"
			>
				<option *ngFor="let country of regionCountries" [value]="country.countryCode">
					{{ country.countryName }}
				</option>
			</select>
		</div>

		<div class="col-12">
			<label for="regionCurrencySelect" class="form-label">Currency</label>
			<select
				id="regionCurrencySelect"
				class="form-select"
				[(ngModel)]="selectedCurrencyCode"
			>
				<option *ngFor="let currency of filteredCurrencies" [value]="currency.currencyCode">
					{{ currency.currencyCode }} - {{ currency.currencyDesc }}
				</option>
			</select>
		</div>
	</div>
</div>

<div class="modal-footer justify-content-center">
	<button
		type="button"
		class="btn btn-primary"
		[disabled]="isLoading || !selectedCurrencyCode || !!errorMessage"
		(click)="ok()"
	>
		OK
	</button>
	<button
		type="button"
		class="btn btn-outline-secondary"
		(click)="cancel()"
	>
		Cancel
	</button>
</div>
