<div class="container-fluid py-3 contract-rov-page" *ngIf="rovContract as contract; else loadingTemplate">
	<div class="accordion" id="rovContractAccordion">
		<div class="accordion-item shadow-sm mb-3" style="display:none;">
			<h2 class="accordion-header" id="headingRovRegionCurrency">
				<button
					id="rovRegionCurrencySectionToggle"
					class="accordion-button"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#collapseRovRegionCurrency"
					aria-expanded="true"
					aria-controls="collapseRovRegionCurrency">
					Country/Currency (Region: <span class="ms-1">{{ contract.regionDesc || contract.regionCode || '-' }}</span>)
				</button>
			</h2>
			<div id="collapseRovRegionCurrency" class="accordion-collapse collapse show" aria-labelledby="headingRovRegionCurrency">
				<div class="accordion-body">
					<div class="row g-3 align-items-end">
						<div class="col-md-6">
							<label class="form-label mb-1">Country</label>
							<button id="rovCountrySelectButton" type="button" class="btn btn-outline-primary btn-sm w-100 text-start">
								{{ contract.countryName || contract.countryCode || '--Select--' }}
							</button>
						</div>
						<div class="col-md-6">
							<label class="form-label mb-1">Foreign Currency</label>
							<button id="rovCurrencySelectButton" type="button" class="btn btn-outline-primary btn-sm w-100 text-start">
								{{ contract.currencyDesc || contract.currencyCode || '--Select--' }}
							</button>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="accordion-item shadow-sm mb-3">
			<h2 class="accordion-header" id="headingRovContract">
				<button
					id="rovContractSectionToggle"
					class="accordion-button"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#collapseRovContract"
					aria-expanded="true"
					aria-controls="collapseRovContract">
					Contract - <span class="text-uppercase ms-1">{{ contract.contractNumber || '-' }}</span>
					<span class="ms-2">(Vendor: {{ contract.concessionaire?.vendorName || '-' }})</span>
				</button>
			</h2>
			<div id="collapseRovContract" class="accordion-collapse collapse show" aria-labelledby="headingRovContract">
				<div class="accordion-body">
					<div class="row g-3 align-items-end">
						<div class="col-lg-4 col-md-6">
							<label class="form-label mb-1">Vendor Number</label>
							<div class="input-group input-group-md">
								<input id="rovVendorNumberInput" class="form-control" maxlength="10" [value]="contract.vendorNumber" />
								<button id="rovVendorLookupButton" type="button" class="btn btn-primary d-flex align-items-center justify-content-center px-3" aria-label="Vendor lookup" title="Vendor lookup">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="vendor-lookup-icon"
                                                    viewBox="0 0 16 16" aria-hidden="true">
                                                    <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16" />
                                                    <path
                                                        d="m10.97 5.97-.03.03-3.992 3.99-1.647-1.647a.75.75 0 0 0-1.06 1.06l2.177 2.177a.75.75 0 0 0 1.06 0l4.523-4.522a.75.75 0 1 0-1.06-1.06" />
                                                </svg>
								</button>
							</div>
						</div>
						<div class="col-lg-5 col-md-6 fw-semibold">
							{{ contract.concessionaire?.vendorName || '-' }}
							<span class="text-muted">({{ contract.vendorNumber || '-' }})</span>
						</div>
						<div class="col-lg-3 col-md-12 text-lg-end">
							<span class="badge" [class.bg-success]="contract.vendorEPaid" [class.bg-warning]="!contract.vendorEPaid" [class.text-dark]="!contract.vendorEPaid">
								ePaid: {{ contract.vendorEPaid ? 'YES' : 'NO' }}
							</span>
						</div>

						<div class="col-lg-3 col-md-6">
							<label class="form-label mb-1">Contract Start Date</label>
							<div class="input-group input-group-md contract-date-input-group">
							<input id="rovContractStartDateInput" 
								type="text"
								class="form-control form-control-sm contract-date-display" 
								[value]="contractStartInput" readonly 
								(click)="openContractDatePicker('contractStart')"/>
							<button type="button" class="btn btn-primary btn-outline-secondary contract-date-trigger"
								aria-label="Open contract start date picker" 
								(click)="openContractDatePicker('contractStart')">
								<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"
									aria-hidden="true">
									<path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h.5A1.5 1.5 0 0 1 15 2.5v11A1.5 1.5 0 0 1 13.5 15h-11A1.5 1.5 0 0 1 1 13.5v-11A1.5 1.5 0 0 1 2.5 1H3V.5a.5.5 0 0 1 .5-.5zM2 5v8.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V5H2z" />
								</svg>
							</button>
							</div>
							<input #contractStartDatePicker type="date" class="contract-date-native-picker" tabindex="-1"
								[min]="contractStartMinDateIso" [value]="getContractDatePickerValue('contractStart')"
								(change)="onContractDatePickerChange('contractStart', $event)" />
						</div>
						<div class="col-lg-3 col-md-6">
							<label class="form-label mb-1">Contract End Date</label>
							<div class="input-group input-group-md contract-date-input-group">
							<input id="rovContractEndDateInput" class="form-control form-control-sm" 
								[value]="contractEndInput" readonly 
								(click)="openContractDatePicker('contractEnd')"/>
							<button type="button" class="btn btn-primary btn-outline-secondary contract-date-trigger"
								aria-label="Open contract end date picker" (click)="openContractDatePicker('contractEnd')">
								<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"
									aria-hidden="true">
									<path
										d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h.5A1.5 1.5 0 0 1 15 2.5v11A1.5 1.5 0 0 1 13.5 15h-11A1.5 1.5 0 0 1 1 13.5v-11A1.5 1.5 0 0 1 2.5 1H3V.5a.5.5 0 0 1 .5-.5zM2 5v8.5a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5V5H2z" />
								</svg>
							</button>
							</div>
							<input #contractEndDatePicker type="date" class="contract-date-native-picker" tabindex="-1"
								[min]="contractEndMinDateIso" [value]="getContractDatePickerValue('contractEnd')"
								(change)="onContractDatePickerChange('contractEnd', $event)" />
						</div>
						<div class="col-lg-4 col-md-8">
							<label class="form-label mb-1">Contract Number</label>
							<div class="input-group input-group-md">
							<input id="rovContractNumberInput" class="form-control form-control-sm text-uppercase" maxlength="30" [value]="contract.contractNumber" />
							<button id="rovContractHelpButton" type="button" class="btn btn-primary btn-outline-secondary btn-sm d-inline-flex align-items-center justify-content-center" aria-label="Contract help" title="Contract help">
								<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
									<path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16" />
									<path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 .877-.252 1.02-.598l.088-.416c.025-.123.054-.248.088-.364l.768-3.618c.194-.897-.105-1.319-.808-1.319-.545 0-.877.252-1.02.598l-.088.416c-.025.123-.054.248-.088.364" />
									<circle cx="8" cy="4.5" r="1" />
								</svg>
							</button>						</div></div>

					</div>
				</div>
			</div>
		</div>

		<div class="accordion-item shadow-sm mb-3">
			<h2 class="accordion-header" id="headingRovOwner">
				<button
					id="rovOwnerSectionToggle"
					class="accordion-button collapsed"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#collapseRovOwner"
					aria-expanded="false"
					aria-controls="collapseRovOwner">
					Concession Owner -
					<span class="ms-1 text-capitalize">{{ contract.ownerFirstName }} {{ contract.ownerLastName }}</span>
				</button>
			</h2>
			<div id="collapseRovOwner" class="accordion-collapse collapse" aria-labelledby="headingRovOwner">
				<div class="accordion-body">
					<div class="row g-3">
						<div class="col-md-6">
							<label class="form-label mb-1">First Name</label>
							<input id="rovOwnerFirstNameInput" class="form-control form-control-sm text-capitalize" maxlength="30" [value]="contract.ownerFirstName" />
						</div>
						<div class="col-md-6">
							<label class="form-label mb-1">Last Name</label>
							<input id="rovOwnerLastNameInput" class="form-control form-control-sm text-capitalize" maxlength="30" [value]="contract.ownerLastName" />
						</div>
						<div class="col-md-6">
							<label class="form-label mb-1">Email Address</label>
							<input id="rovOwnerEmailInput" class="form-control form-control-sm text-uppercase" [value]="contract.ownerEmail" />
						</div>
						<div class="col-md-6">
							<label class="form-label mb-1">Phone Number</label>
							<input id="rovOwnerPhoneInput" class="form-control form-control-sm" maxlength="15" [value]="contract.ownerPhone" placeholder="201-555-0123" />
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="accordion-item shadow-sm mb-3" *ngIf="contract.facility as facility">
			<h2 class="accordion-header" id="headingRovFacility">
				<button
					id="rovFacilitySectionToggle"
					class="accordion-button"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#collapseRovFacility"
					aria-expanded="true"
					aria-controls="collapseRovFacility">
					Facility - <span class="ms-1">{{ facility.facilityNumber || '-' }}</span>
				</button>
			</h2>
			<div id="collapseRovFacility" class="accordion-collapse collapse show" aria-labelledby="headingRovFacility">
				<div class="accordion-body">
					<div class="row g-3 align-items-end">
						<div class="col-lg-4 col-md-6">
							<label class="form-label mb-1">Facility Number</label>
							<div class="input-group input-group-md">
								<input id="rovFacilityNumberInput" class="form-control" maxlength="10" [value]="facility.facilityNumber" />
								<button id="rovFacilityLookupButton" type="button" class="btn btn-primary  d-flex align-items-center justify-content-center px-3" aria-label="Facility lookup" title="Facility lookup">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="vendor-lookup-icon"
                                                    viewBox="0 0 16 16" aria-hidden="true">
                                                    <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16" />
                                                    <path
                                                        d="m10.97 5.97-.03.03-3.992 3.99-1.647-1.647a.75.75 0 0 0-1.06 1.06l2.177 2.177a.75.75 0 0 0 1.06 0l4.523-4.522a.75.75 0 1 0-1.06-1.06" />
                                                </svg>
								</button>
							</div>
						</div>
						<div class="col-lg-4 col-md-6">
							<label class="form-label mb-1">Business Model</label>
							<select
								id="rovBusinessModelButton"
								class="form-select form-select-sm"
								[value]="facility.businessFunctionUid || 0"
								(change)="onBusinessFunctionChange($event)">
								<option value="0">--Select--</option>
								<option *ngFor="let businessFunction of rovRefList.businessFunctions"
									[value]="businessFunction.businessFunctionUid" [selected]="facility.businessFunctionUid === businessFunction.businessFunctionUid">
									{{ businessFunction.description }}
								</option>
							</select>
						</div>
						<div class="col-lg-4 col-md-12">
							<label class="form-label mb-1">MID/TID Facility Number</label>
							<input id="rovChargeToFacilityNumberInput" class="form-control form-control-sm" maxlength="10" [value]="contract.chargeToFaciltyNbr" />
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="accordion-item shadow-sm mb-3">
			<h2 class="accordion-header" id="headingRovEvents">
				<button
					id="rovEventsSectionToggle"
					class="accordion-button"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#collapseRovEvents"
					aria-expanded="true"
					aria-controls="collapseRovEvents">
					Events ({{ contract.facility?.events?.length || 0 }})
				</button>
			</h2>
			<div id="collapseRovEvents" class="accordion-collapse collapse show" aria-labelledby="headingRovEvents">
				<div class="accordion-body">
					<ng-container *ngIf="contract.facility?.events?.length; else noEventsTemplate">
						<div class="accordion" id="rovEventAccordion">
							<div class="accordion-item mb-2" *ngFor="let event of contract.facility.events; let i = index">
								<h3 class="accordion-header d-flex align-items-center gap-2 pe-2" [id]="'headingRovEvent' + i">
									<button
										[id]="'rovEventToggleButton' + i"
										class="accordion-button collapsed py-2 flex-grow-1"
										type="button"
										data-bs-toggle="collapse"
										[attr.data-bs-target]="'#collapseRovEvent' + i"
										aria-expanded="false"
										[attr.aria-controls]="'collapseRovEvent' + i">
											<span class="text-uppercase">
												{{ event.EventName || '-' }}
											</span>
											<span class="ms-1 text-muted">
												({{ formatDate(event.EventStartDate) || '-' }} to {{ formatDate(event.EventEndDate) || '-' }})
											</span>
									</button>
									<button [id]="'rovEventReportsButton' + i" type="button" class="btn btn-outline-info btn-md" (click)="$event.stopPropagation()">Reports</button>
									<button [id]="'rovStartEventButton' + i" type="button" class="btn btn-outline-primary btn-md" *ngIf="!event.DayStarted" (click)="$event.stopPropagation()">Start Event</button>
									<span class="small text-muted text-nowrap">Event ID: {{ event.EventID || 0 }}</span>
								</h3>
								<div
									class="accordion-collapse collapse"
									[id]="'collapseRovEvent' + i"
									[attr.aria-labelledby]="'headingRovEvent' + i">
									<div class="accordion-body">
										<div class="row g-3">
											<div class="col-lg-5 col-md-6">
												<label class="form-label mb-1">Event Location</label>
												<input [id]="'rovEventLocationInput' + i" class="form-control form-control-sm text-uppercase" [value]="event.EventName" readonly />
											</div>
											<div class="col-lg-2 col-md-3">
												<label class="form-label mb-1">Suite Number</label>
												<input [id]="'rovEventSuiteNumberInput' + i" class="form-control form-control-sm text-uppercase" [value]="event.SuiteNbr" readonly />
											</div>
											<div class="col-lg-3 col-md-3">
												<label class="form-label mb-1">Terminal ID</label>
												<input [id]="'rovEventTerminalIdInput' + i" class="form-control form-control-sm text-uppercase" [value]="event.FacilityTerminal" readonly />
											</div>
											<div class="col-lg-2 col-md-6">
												<label class="form-label mb-1">Fee Type</label>
												<input [id]="'rovEventFeeTypeInput' + i" class="form-control form-control-sm" [value]="event.FeeTypeCode || '--Select--'" readonly />
											</div>

											<div class="col-lg-3 col-md-6">
												<label class="form-label mb-1">Event Start Date</label>
												<input [id]="'rovEventStartDateInput' + i" class="form-control form-control-sm" [value]="formatDate(event.EventStartDate)" readonly />
											</div>
											<div class="col-lg-3 col-md-6">
												<label class="form-label mb-1">Event End Date</label>
												<input [id]="'rovEventEndDateInput' + i" class="form-control form-control-sm" [value]="formatDate(event.EventEndDate)" readonly />
											</div>
											<div class="col-lg-3 col-md-6">
												<label class="form-label mb-1">Fee Amount ($)</label>
												<input [id]="'rovEventFeeAmountInput' + i" class="form-control form-control-sm" [value]="event.FlatFeeDollarAmount" readonly />
											</div>
											<div class="col-lg-3 col-md-6">
												<label class="form-label mb-1">Department Count</label>
												<input [id]="'rovEventDepartmentCountInput' + i" class="form-control form-control-sm" [value]="event.Departments?.length || 0" readonly />
											</div>
										</div>
									</div>
								</div>
							</div>
						</div>

						<div class="d-flex justify-content-end align-items-center gap-2 mt-3">
							<span class="text-muted small">{{ contract.facility?.events?.length || 0 }} event(s)</span>
							<button id="rovEventsPreviousButton" type="button" class="btn btn-outline-secondary btn-sm" disabled>Previous</button>
							<button id="rovEventsNextButton" type="button" class="btn btn-outline-secondary btn-sm" disabled>Next</button>
						</div>
					</ng-container>

					<ng-template #noEventsTemplate>
						<div class="alert alert-light border mb-0">No events available for this contract.</div>
					</ng-template>
				</div>
			</div>
		</div>
	</div>
</div>

<ng-template #loadingTemplate>
	<div class="container-fluid py-3">
		<div class="alert alert-info mb-0">Loading contract data...</div>
	</div>
</ng-template>
